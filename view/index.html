<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vạn Hoa Lầu</title>
    <link rel="icon" href="../logo.png">
    <style>
        @font-face {
            font-family: 'VNI Thuphap Vniongdo';
            src: url('../vni.thuphap.vniongdo.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        #header {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        #logo {
            width: 120px;
            height: auto;
            margin-right: 20px;
        }

        #label {
            font-family: 'VNI Thuphap Vniongdo', serif;
            font-size: 40px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        #content-container {
            position: relative;
            z-index: 5;
            padding: 40px 20px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
        }

        .content-item {
            background: transparent;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .content-item h1 {
            margin-top: 0;
            color: #fff;
        }

        .content-item .images, .content-item .videos {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .content-item img, .content-item video {
            width: auto;
            height: 75vh;
            border-radius: 5px;
            margin: 0 0 10px 0;
            flex: none;
        }

        .content-item p {
            margin: 10px 0;
        }

        .category {
            background: #007bff;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEU_hkazFaQ47eBcWglU0QZr5N4i_XPFk",
            authDomain: "eng-vocab-website.firebaseapp.com",
            projectId: "eng-vocab-website",
            storageBucket: "eng-vocab-website.firebasestorage.app",
            messagingSenderId: "669746577120",
            appId: "1:669746577120:web:494b943ef1319ce4d69a85",
            measurementId: "G-DHBPC5RL89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const contentContainer = document.getElementById('content-container');
            if (id) {
                const docRef = doc(db, 'content', id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    contentContainer.innerHTML = `
                        <div class="content-item">
                            <h1>${data.title}</h1>
                            <p>${data.info}</p>
                            <div class="videos">
                                ${data.vid ? data.vid.map(vid => `<video controls><source src="${vid.url}" type="video/mp4"></video>`).join('') : ''}
                            </div>
                            <div class="images">
                                ${data.img ? data.img.map(img => `<img src="${img.url}" alt="Image">`).join('') : ''}
                            </div>
                        </div>
                    `;
                } else {
                    contentContainer.innerHTML = '<p>Content not found.</p>';
                }
            } else {
                contentContainer.innerHTML = '<p>No id provided.</p>';
            }
        });

        function adjustMedia(element) {
            console.log('Adjusting media for:', element);
            element.style.height = '75vh';
            element.style.width = 'auto';
        }
        window.adjustMedia = adjustMedia;
    </script>
</head>
<body>
    <video id="background-video" autoplay muted loop>
        <source src="background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div id="header">
    </div>
    <div id="content-container">
        <!-- Content will be loaded here -->
    </div>
</body>
</html>
