
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vạn Hoa Lầu</title>
    <link rel="icon" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'VNI Thuphap Vniongdo';
            src: url('../vni.thuphap.vniongdo.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: #000000;
        }

        #header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        #logo {
            width: 120px;
            height: auto;
            cursor: pointer;
        }

        #label {
            font-family: 'VNI Thuphap Vniongdo', serif;
            font-size: 40px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }


        #content-container {
            position: relative;
            z-index: 5;
            padding: 10px 20px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
        }

        .content-item {
            background: transparent;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .content-item h1 {
            margin-top: 0;
            text-align: center;
            font-family: 'Amatic SC', cursive;
            font-size: 36px;

            display: inline-block; /* QUAN TRỌNG */

            background: linear-gradient(to right, orange, red);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .content-item .images, .content-item .videos {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .content-item img, .content-item video {
            width: auto;
            height: 75vh;
            border-radius: 5px;
            margin: 0 0 10px 0;
            flex: none;
        }

        .content-item p {
            margin: 0 0 10px 0;
            font-family: 'Shalimar', cursive;
            font-size: 28px;
            text-align: left;
            background: linear-gradient(to right, orange, red);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .category {
            background: #007bff;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .content-item img, .content-item video {
                max-width: 90vw;
                max-height: 75vh;
                object-fit: contain;
            }
            #content-container {
                padding: 30px 0px 20px;
            }
            #logo {
                width: 80px;
            }
            #header {
                top: 0px;
                left: 5px;
            }
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEU_hkazFaQ47eBcWglU0QZr5N4i_XPFk",
            authDomain: "eng-vocab-website.firebaseapp.com",
            projectId: "eng-vocab-website",
            storageBucket: "eng-vocab-website.firebasestorage.app",
            messagingSenderId: "669746577120",
            appId: "1:669746577120:web:494b943ef1319ce4d69a85",
            measurementId: "G-DHBPC5RL89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            const isMobile = window.innerWidth <= 768;
            const videoSrc = isMobile ? 'mobile.mp4' : 'pc.mp4';
            const videoElement = document.getElementById('background-video');
            videoElement.querySelector('source').src = videoSrc;
            videoElement.load();

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const contentContainer = document.getElementById('content-container');
            if (id) {
                const docRef = doc(db, 'content', id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    contentContainer.innerHTML = `
                        <div class="content-item">
                            <h1>${data.title}</h1>
                            <p>${data.info.replace(/\n/g, '<br>')}</p>
                            <div class="videos">
                                ${data.vid ? data.vid.map(vid => `<video controls><source src="${vid.url}" type="video/mp4"></video>`).join('') : ''}
                            </div>
                            <div class="images">
                                ${data.img ? data.img.map(img => `<img src="${img.url}" alt="Image">`).join('') : ''}
                            </div>
                        </div>
                    `;
                    const overlay = document.getElementById('loading-overlay');
                    overlay.style.display = 'flex';
                    const images = contentContainer.querySelectorAll('img');
                    const videos = contentContainer.querySelectorAll('video');
                    let loadedCount = 0;
                    const total = images.length + videos.length;
                    if (total === 0) {
                        overlay.style.display = 'none';
                    } else {
                        images.forEach(img => {
                            img.onload = () => {
                                loadedCount++;
                                if (loadedCount === total) {
                                    overlay.style.display = 'none';
                                }
                            };
                            img.onerror = () => {
                                loadedCount++;
                                if (loadedCount === total) {
                                    overlay.style.display = 'none';
                                }
                            };
                        });
                        videos.forEach(video => {
                            video.onloadeddata = () => {
                                loadedCount++;
                                if (loadedCount === total) {
                                    overlay.style.display = 'none';
                                }
                            };
                            video.onerror = () => {
                                loadedCount++;
                                if (loadedCount === total) {
                                    overlay.style.display = 'none';
                                }
                            };
                        });
                    }
                } else {
                    contentContainer.innerHTML = '<p>Content not found.</p>';
                }
            } else {
                contentContainer.innerHTML = '<p>No id provided.</p>';
            }
        });

        function adjustMedia(element) {
            element.style.height = '75vh';
            element.style.width = 'auto';
        }
        window.adjustMedia = adjustMedia;

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function createParticle() {
            const colorOptions = [
                () => `rgba(0,255,0,${Math.random() * 0.8 + 0.2})`, // green
                () => `rgba(255,255,0,${Math.random() * 0.8 + 0.2})`, // yellow
                () => `rgba(0,0,255,${Math.random() * 0.8 + 0.2})`,  // blue
                () => `rgba(255,0,0,${Math.random() * 0.8 + 0.2})`,  // red
                () => `rgba(128,0,128,${Math.random() * 0.8 + 0.2})`   // purple
            ];
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                color: colorOptions[Math.floor(Math.random() * colorOptions.length)](),
                size: Math.random() * 3 + 1
            };
        }

        for (let i = 0; i < 100; i++) {
            particles.push(createParticle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</head>
<body>
    <canvas id="particleCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;"></canvas>
    <video id="background-video" autoplay muted loop>
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div id="header">
        <img id="logo" src="../logo.png" alt="Logo" onclick="window.location.href='../index.html'">
    </div>
    <div id="content-container">
        <!-- Content will be loaded here -->
    </div>
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; color: #fff; font-size: 16px;">
        <div class="spinner"></div>
    </div>
</body>
</html>
