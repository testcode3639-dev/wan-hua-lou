<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vạn Hoa Lầu</title>
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'VNI Thuphap Vniongdo';
            src: url('vni.thuphap.vniongdo.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        #header {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        #logo {
            width: 120px;
            height: auto;
            margin-right: 20px;
        }

        #label {
            font-family: 'VNI Thuphap Vniongdo', serif;
            font-size: 40px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        #content-container {
            position: relative;
            z-index: 5;
            padding: 120px 20px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            max-width: 50%;
        }

        .content-item {
            background: transparent;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .content-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.7);
        }

        .content-item h3 {
            margin-top: 0;
            color: #fff;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 2em;
        }

        .content-item img {
            max-height: 200px;
            width: auto;
            max-width: 100%;
            border-radius: 5px;
        }

        .content-item p {
            margin: 10px 0;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 1.2em;
        }

        .category {
            margin-top: 0;
            color: #fff;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 2em;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEU_hkazFaQ47eBcWglU0QZr5N4i_XPFk",
            authDomain: "eng-vocab-website.firebaseapp.com",
            projectId: "eng-vocab-website",
            storageBucket: "eng-vocab-website.firebasestorage.app",
            messagingSenderId: "669746577120",
            appId: "1:669746577120:web:494b943ef1319ce4d69a85",
            measurementId: "G-DHBPC5RL89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadContents() {
            const contentContainer = document.getElementById('content-container');
            contentContainer.innerHTML = '';
            const querySnapshot = await getDocs(collection(db, 'content'));
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = 'content-item';
                const thumbUrl = data.thumb || (data.img && Array.isArray(data.img) && data.img.length > 0 ? data.img[0].url : '');
                item.innerHTML = `
                    <h3>${data.title}</h3>
                    ${thumbUrl ? `<img src="${thumbUrl}" alt="Image">` : ''}
                    <p class="category">${data.cate}</p>
                `;
                item.style.cursor = 'pointer';
                item.onclick = () => window.location.href = 'view/index.html?id=' + doc.id;
                contentContainer.appendChild(item);
            });
        }

        document.addEventListener('DOMContentLoaded', loadContents);

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const logoTop = 20;
            const items = document.querySelectorAll('.content-item');
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemTop = rect.top + scrollY;
                if (itemTop < scrollY + logoTop) {
                    const distance = (scrollY + logoTop) - itemTop;
                    const opacity = Math.max(0, 1 - distance / 150);
                    item.style.opacity = opacity;
                } else {
                    item.style.opacity = 1;
                }
            });
        });
    </script>
</head>
<body>
    <video id="background-video" autoplay muted loop>
        <source src="background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div id="header">
        <img id="logo" src="logo.png" alt="Logo">
        <div id="label">Vaïn Hoa Laâu</div>
    </div>
    <div id="content-container">
        <!-- Content will be loaded here -->
    </div>
</body>
</html>
