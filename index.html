<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vạn Hoa Lầu</title>
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        @font-face {
            font-family: 'VNI Thuphap Vniongdo';
            src: url('vni.thuphap.vniongdo.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: #000000;
        }

        #header {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        #search-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid #fff;
            border-radius: 5px;
            padding: 5px 10px;
        }

        #search-container i {
            color: #fff;
            margin-right: 5px;
        }

        #search {
            padding: 5px;
            font-size: 16px;
            width: 200px;
            border: none;
            background: transparent;
            color: #fff;
        }

        #logo {
            width: 120px;
            height: auto;
            margin-right: 20px;
        }

        #label {
            font-family: 'VNI Thuphap Vniongdo', serif;
            font-size: 40px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        #content-container {
            position: relative;
            z-index: 5;
            padding: 120px 20px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            max-width: 50%;
        }

        .content-item {
            background: transparent;
            border-radius: 10px;
            padding: 20px;
            width: 20vw;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.7);
        }

        .content-item h3 {
            margin-top: 0;
            color: #fff;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 2em;
        }

        .content-item img {
            max-height: 200px;
            width: auto;
            max-width: 100%;
            border-radius: 5px;
            margin: 0 auto;
        }

        .content-item p {
            margin: 10px 0;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 1.2em;
        }

        .category {
            margin-top: 0;
            color: #fff;
            font-family: 'Shalimar', cursive;
            font-weight: normal;
            font-size: 1em;
            text-align: center;
        }

        @media (max-width: 768px) {
            #content-container {
                max-width: 100%;
                padding-top: 150px;
            }
            .content-item {
                width: 100%;
            }
            .content-item h3 {
                font-size: 1.5em;
            }
            .content-item p {
                font-size: 1em;
            }
            .category {
                font-size: 0.8em;
            }
            #search {
                display: block;
                border: 1px solid #fff;
            }
            #search-container {
                top: 105px;
                border: none;
            }
            #search-container i {
                cursor: pointer;
            }
            #background-video {
                object-position: center;
            }
        }

        #pagination {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            width: 100vw;
            left: 45%;
            transform: translateX(-50%);
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        #notification {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 20px;
            border-radius: 5px;
            z-index: 1000;
            font-family: "Shalimar", cursive;
            font-size: 24px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        window.adjustMedia = function(element) {
            element.style.height = '75vh';
            element.style.width = 'auto';
        };
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEU_hkazFaQ47eBcWglU0QZr5N4i_XPFk",
            authDomain: "eng-vocab-website.firebaseapp.com",
            projectId: "eng-vocab-website",
            storageBucket: "eng-vocab-website.firebasestorage.app",
            messagingSenderId: "669746577120",
            appId: "1:669746577120:web:494b943ef1319ce4d69a85",
            measurementId: "G-DHBPC5RL89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allItems = [];
        let subcategories = [];
        let selectedSubcategories = [];
        let currentFilteredItems = [];
        let currentPage = 1;
        let itemsPerPage = window.innerWidth <= 768 ? 10 : 20;
        let totalPages = 1;
        let showingNotification = false;

        async function loadSubcategories() {
            subcategories = [];
            const querySnapshot = await getDocs(collection(db, 'subcategories'));
            querySnapshot.forEach((doc) => {
                subcategories.push({id: doc.id, name: doc.data().name});
            });
            subcategories.sort((a, b) => a.name.localeCompare(b.name));
            renderSubcategoryFilters();
        }

        function renderSubcategoryFilters() {
            const container = document.getElementById('subcategory-filter');
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                container.style.maxHeight = 'none';
                container.innerHTML = '<div id="category-list" style="display: none; height: 100vh; overflow-y: auto;"></div>';
                const listContainer = document.getElementById('category-list');
                subcategories.forEach(sub => {
                    const label = document.createElement('label');
                    label.style.display = 'block';
                    label.style.color = '#fff';
                    label.style.margin = '5px 0';
                    label.style.fontFamily = "'Shalimar', cursive";
                    label.style.fontSize = "20px";
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = sub.id;
                    checkbox.checked = selectedSubcategories.includes(sub.id);
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectedSubcategories.push(sub.id);
                        } else {
                            selectedSubcategories = selectedSubcategories.filter(id => id !== sub.id);
                        }
                        filterItems();
                    });
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(' ' + sub.name));
                    listContainer.appendChild(label);
                });
                const sortLabel = document.createElement('label');
                sortLabel.style.display = 'block';
                sortLabel.style.color = '#fff';
                sortLabel.style.margin = '5px 0';
                sortLabel.style.fontFamily = "'Shalimar', cursive";
                sortLabel.style.fontSize = "20px";
                const sortCheckbox = document.createElement('input');
                sortCheckbox.type = 'checkbox';
                sortCheckbox.id = 'sort-checkbox';
                sortCheckbox.addEventListener('change', async (e) => {
                    if (e.target.checked) {
                        await loadContents('view', 'desc');
                    } else {
                        await loadContents();
                    }
                    filterItems();
                });
                sortLabel.appendChild(sortCheckbox);
                sortLabel.appendChild(document.createTextNode(' Lượt xem cao nhất'));
                listContainer.appendChild(sortLabel);
                document.getElementById('category-btn').addEventListener('click', () => {
                    const list = document.getElementById('category-list');
                    const container = document.getElementById('subcategory-filter');
                    if (list.style.display === 'none') {
                        list.style.display = 'block';
                        container.style.top = '150px';
                        container.style.height = 'calc(100vh - 150px)';
                    } else {
                        list.style.display = 'none';
                        container.style.top = '120px';
                        container.style.height = 'auto';
                    }
                });
            } else {
                container.innerHTML = '';
                container.style.maxHeight = 'calc(100vh - 120px)';
                container.style.height = 'auto';
                container.style.overflowY = 'auto';
                const sortLabel = document.createElement('label');
                sortLabel.style.display = 'block';
                sortLabel.style.color = '#fff';
                sortLabel.style.margin = '5px 0';
                sortLabel.style.fontFamily = "'Shalimar', cursive";
                sortLabel.style.fontSize = "28px";
                const sortCheckbox = document.createElement('input');
                sortCheckbox.type = 'checkbox';
                sortCheckbox.id = 'sort-checkbox';
                sortCheckbox.addEventListener('change', async (e) => {
                    if (e.target.checked) {
                        await loadContents('view');
                    } else {
                        await loadContents();
                    }
                    filterItems();
                });
                sortLabel.appendChild(sortCheckbox);
                sortLabel.appendChild(document.createTextNode(' Lượt xem cao nhất'));
                container.appendChild(sortLabel);
                subcategories.forEach(sub => {
                    const label = document.createElement('label');
                    label.style.display = 'block';
                    label.style.color = '#fff';
                    label.style.margin = '5px 0';
                    label.style.fontFamily = "'Shalimar', cursive";
                    label.style.fontSize = "28px";
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = sub.id;
                    checkbox.checked = selectedSubcategories.includes(sub.id);
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectedSubcategories.push(sub.id);
                        } else {
                            selectedSubcategories = selectedSubcategories.filter(id => id !== sub.id);
                        }
                        filterItems();
                    });
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(' ' + sub.name));
                    container.appendChild(label);
                });
            }
        }

        async function loadContents(sortBy = 'updatedAt') {
            const contentContainer = document.getElementById('content-container');
            contentContainer.innerHTML = '';
            const q = query(collection(db, 'content'));
            const querySnapshot = await getDocs(q);
            allItems = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = 'content-item';
                const thumbUrl = data.thumb || (data.img && Array.isArray(data.img) && data.img.length > 0 ? data.img[0].url : '');
                const imageCount = data.img && Array.isArray(data.img) ? data.img.length : 0;
                const videoCount = data.vid && Array.isArray(data.vid) ? data.vid.length : 0;
                item.innerHTML = `
                    <h3>${data.title}</h3>
                    ${thumbUrl ? `<img src="${thumbUrl}" alt="Image" onload="adjustImage(this)">` : ''}
                    <p class="category"><i class="bi bi-card-image"></i> ${imageCount}, <i class="bi bi-camera-video"></i> ${videoCount}, <i class="bi bi-eye"></i> ${data.view || 0}<br><i class="bi bi-calendar4-week"></i> ${(() => { const d = new Date(data.updatedAt); return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); })()}</p>
                `;
                item.style.cursor = 'pointer';
                item.onclick = () => window.location.href = 'view/index.html?id=' + doc.id;
                allItems.push({element: item, title: data.title, subcate: data.subcate || [], data: data});
            });
            allItems.sort((a, b) => {
                if (sortBy == 'updatedAt') {
                    return new Date(b.data.updatedAt) - new Date(a.data.updatedAt);
                } else if (sortBy == 'view') {
                    const aView = a.data.view || 0;
                    const bView = b.data.view || 0;
                    if (bView !== aView) {
                        return bView - aView;
                    } else {
                        return new Date(b.data.updatedAt) - new Date(a.data.updatedAt);
                    }
                }
            });
            currentFilteredItems = allItems;
            totalPages = Math.ceil(allItems.length / itemsPerPage);
            displayItems(allItems, currentPage);
            renderPagination();
        }

        function displayItems(items, page) {
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = items.slice(start, end);
            pageItems.forEach(item => container.appendChild(item.element));
            const paginationDiv = document.createElement('div');
            paginationDiv.id = 'pagination';
            container.appendChild(paginationDiv);
        }

        function filterItems() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allItems.filter(item => {
                const titleMatch = item.title.toLowerCase().includes(query);
                const subcateNames = item.subcate.map(id => subcategories.find(sub => sub.id === id)?.name || '').join(' ').toLowerCase();
                const subcateNameMatch = subcateNames.includes(query);
                const selectedMatch = selectedSubcategories.length === 0 || selectedSubcategories.every(sub => item.subcate.includes(sub));
                return (titleMatch || subcateNameMatch) && selectedMatch;
            });
            currentFilteredItems = filtered;
            totalPages = Math.ceil(filtered.length / itemsPerPage);
            currentPage = 1;
            displayItems(filtered, 1);
            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            if (totalPages <= 1) return;
            const isMobile = window.innerWidth <= 768;
            const prevText = isMobile ? 'Prev' : 'Trang trước';
            const nextText = isMobile ? 'Next' : 'Trang sau';
            const goText = isMobile ? 'Go' : 'Đi đến';
            const fontSize = isMobile ? '20px' : '24px';
            const prevBtn = document.createElement('button');
            prevBtn.textContent = prevText;
            prevBtn.style.cssText = `background: transparent; color: #fff; border: 1px solid #fff; padding: 5px 10px; margin: 0 5px; font-family: "Shalimar", cursive; font-size: ${fontSize}; cursor: pointer;`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayItems(currentFilteredItems, currentPage);
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            container.appendChild(prevBtn);
            const pageInput = document.createElement('input');
            pageInput.type = 'number';
            pageInput.min = 1;
            pageInput.max = totalPages;
            pageInput.value = currentPage;
            pageInput.style.cssText = `width: 25px; padding: 5px; margin: 0 5px; font-family: "Shalimar", cursive; font-size: ${fontSize}; -webkit-appearance: none; -moz-appearance: textfield; text-align: center; background: transparent; color: #fff;`;
            pageInput.addEventListener('input', () => {
                const value = pageInput.value.trim();
                const page = parseInt(value);
                if (page >= 1 && page <= totalPages) {
                    currentPage = page;
                    displayItems(currentFilteredItems, currentPage);
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (value !== '' && !isNaN(page) && (page < 1 || page > totalPages) && !showingNotification) {
                    showingNotification = true;
                    const notification = document.getElementById('notification');
                    notification.textContent = 'Trang không hợp lệ';
                    notification.style.display = 'block';
                    setTimeout(() => {
                        notification.style.display = 'none';
                        showingNotification = false;
                    }, 1000);
                }
            });
            container.appendChild(pageInput);
            const slash = document.createElement('span');
            slash.textContent = ' / ';
            slash.style.cssText = `color: #fff; margin: 0 5px; font-family: "Shalimar", cursive; font-size: ${fontSize};`;
            container.appendChild(slash);
            const totalDisplay = document.createElement('span');
            totalDisplay.textContent = totalPages;
            totalDisplay.style.cssText = `color: #fff; margin: 0 5px; font-family: "Shalimar", cursive; font-size: ${fontSize};`;
            container.appendChild(totalDisplay);
            const nextBtn = document.createElement('button');
            nextBtn.textContent = nextText;
            nextBtn.style.cssText = `background: transparent; color: #fff; border: 1px solid #fff; padding: 5px 10px; margin: 0 5px; font-family: "Shalimar", cursive; font-size: ${fontSize}; cursor: pointer;`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayItems(currentFilteredItems, currentPage);
                    renderPagination();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            container.appendChild(nextBtn);
        }

        function adjustImage(img) {
            img.style.height = '80vh';
            img.style.width = 'auto';
        }

        window.adjustImage = adjustImage;


        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('loading-overlay').style.display = 'flex';
            if (window.innerWidth <= 768) {
                const searchContainer = document.getElementById('search-container');
                const categoryBtn = document.createElement('button');
                categoryBtn.id = 'category-btn';
                categoryBtn.style.color = '#fff';
                categoryBtn.style.background = 'transparent';
                categoryBtn.style.border = '1px solid #fff';
                categoryBtn.style.padding = '5px';
                categoryBtn.style.fontFamily = "'Shalimar', cursive";
                categoryBtn.style.fontSize = "20px";
                categoryBtn.textContent = 'Thể loại';
                searchContainer.appendChild(categoryBtn);
                searchContainer.style.display = 'flex';
                searchContainer.style.alignItems = 'center';
                searchContainer.style.gap = '10px';
                const input = document.getElementById('search');
                input.style.display = 'block';
            }
            await loadContents();
            await loadSubcategories();
            document.getElementById('search').addEventListener('input', filterItems);
            document.getElementById('loading-overlay').style.display = 'none';
            window.addEventListener('resize', () => {
                const newItemsPerPage = window.innerWidth <= 768 ? 10 : 20;
                if (newItemsPerPage !== itemsPerPage) {
                    itemsPerPage = newItemsPerPage;
                    totalPages = Math.ceil(currentFilteredItems.length / itemsPerPage);
                    currentPage = 1;
                    displayItems(currentFilteredItems, 1);
                    renderPagination();
                }
            });
        });

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const logoTop = 20;
            const items = document.querySelectorAll('.content-item');
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const itemTop = rect.top + scrollY;
                if (itemTop < scrollY + logoTop) {
                    const distance = (scrollY + logoTop) - itemTop;
                    const opacity = Math.max(0, 1 - distance / 150);
                    item.style.opacity = opacity;
                } else {
                    item.style.opacity = 1;
                }
            });
        });
    </script>
</head>
<body>
    <video id="background-video" autoplay muted loop>
        <source src="pc.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div id="header">
        <img id="logo" src="logo.png" alt="Logo">
        <div id="label">Vaïn Hoa Laâu</div>
    </div>
    <div id="search-container">
        <i class="bi bi-search"></i>
        <input id="search" placeholder="Tìm kiếm...">
    </div>
    <div id="subcategory-filter" style="position: fixed; top: 120px; right: 20px; z-index: 10; background: transparent; border-radius: 5px; padding: 10px; max-height: 300px; overflow-y: auto;"></div>
    <div id="content-container">
        <!-- Content will be loaded here -->
    </div>
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; color: #fff; font-size: 16px;">
        <div class="spinner"></div>
    </div>
    <div id="notification"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('background-video');
            const source = video.querySelector('source');
            if (window.innerWidth <= 768) {
                source.src = 'mobile.mp4';
            } else {
                source.src = 'pc.mp4';
            }
            video.load();
        });
    </script>
</body>
</html>
